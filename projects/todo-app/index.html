<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Lista de Tareas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <!-- Header -->
            <div class="app-header">
                <h1><i class="fas fa-tasks"></i> Mi Lista de Tareas</h1>
                <p class="subtitle">Organiza tu día productivamente</p>
            </div>

            <!-- Input Section -->
            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoInput" 
                        placeholder="Agrega una nueva tarea..."
                        class="todo-input"
                    >
                    <button id="addBtn" class="btn-add">
                        <i class="fas fa-plus"></i> Agregar
                    </button>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">Todas</button>
                    <button class="filter-btn" data-filter="active">Activas</button>
                    <button class="filter-btn" data-filter="completed">Completadas</button>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat">
                    <span class="stat-label">Total</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completadas</span>
                    <span class="stat-value" id="completedCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Pendientes</span>
                    <span class="stat-value" id="pendingCount">0</span>
                </div>
            </div>

            <!-- Todo List -->
            <div class="todos-section">
                <ul id="todoList" class="todo-list">
                    <!-- Las tareas se agregan aquí dinámicamente -->
                </ul>

                <!-- Empty State -->
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>No hay tareas aún</p>
                    <small>¡Crea tu primera tarea para comenzar!</small>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="clearCompleted" class="btn-secondary">
                    <i class="fas fa-trash"></i> Limpiar Completadas
                </button>
                <button id="clearAll" class="btn-danger">
                    <i class="fas fa-broom"></i> Limpiar Todo
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
